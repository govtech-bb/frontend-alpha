version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Required — build will fail if these are missing
        - env | grep -e SES_REGION >> .env.production
        - env | grep -e MAIL_FROM >> .env.production
        - env | grep -e FEEDBACK_TO_EMAIL >> .env.production
        - env | grep -e FEEDBACK_FROM_EMAIL >> .env.production
        # Optional — || true prevents grep exit code 1 from failing the build
        - env | grep -e SES_CONFIGURATION_SET >> .env.production || true
        - env | grep -e SES_TAG_KEY >> .env.production || true
        - env | grep -e SES_TAG_VALUE >> .env.production || true
        - env | grep -e FORMS_DEFAULT_EMAIL >> .env.production || true
        # Set in dev Amplify app only — redirects all emails to the safe test inbox.
        # Leave unset in prod so real recipients receive emails.
        - env | grep -e SES_DEV_NOTIFICATION_EMAIL >> .env.production || true
        # Case-management webhook — set in both dev and prod Amplify apps.
        # Without these, sendFormSubmittedWebhook returns "not_configured"
        # and submissions are never registered with MoY.
        - env | grep -e WEBHOOK_URL >> .env.production || true
        - env | grep -e WEBHOOK_SECRET >> .env.production || true
        - env | grep -e EZPAY_API_KEY >> .env.production || true
        - env | grep -e EZPAY_BASE_URL >> .env.production || true
        - env | grep -e NEXT_PUBLIC_EZPAY_BASE_URL >> .env.production || true
        - env | grep -e RESEARCH_ACCESS_TOKEN >> .env.production || true
        - env | grep -e ALLOW_INDEXING >> .env.production || true
        - env | grep -e NEXT_PUBLIC_SITE_URL >> .env.production || true
        - env | grep -e NEXT_PUBLIC_PROCESSING_API >> .env.production || true
        - env | grep -e FORMS_S3_BUCKET >> .env.production || true
        - env | grep -e FORMS_S3_REGION >> .env.production || true
        - env | grep -e NODE_ENV >> .env.production || true
        # Matches NEXT_PUBLIC_SENTRY_DSN, NEXT_PUBLIC_SENTRY_ENABLED, NEXT_PUBLIC_SENTRY_ENVIRONMENT
        - env | grep -e NEXT_PUBLIC_SENTRY >> .env.production || true
        # Server-side and edge runtime Sentry vars (non-NEXT_PUBLIC)
        - env | grep -e SENTRY_ENABLED >> .env.production || true
        - env | grep -e SENTRY_ENVIRONMENT >> .env.production || true
        # SENTRY_AUTH_TOKEN is read directly by withSentryConfig during the
        # webpack build and must NOT be written to .env.production. Set it as
        # an Amplify environment variable in the console (not via SSM).
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
