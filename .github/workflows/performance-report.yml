name: Performance report

on:
  push:
    branches: [prod]
  pull_request:
    branches: [prod]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: performance-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Generate performance report
    runs-on: ubuntu-latest
    env:
      MAIL_FROM: "no-reply@notify.dev.alpha.gov.bb"
      SES_REGION: "region"
      FEEDBACK_TO_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
      FEEDBACK_FROM_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build Next.js
        run: npm run build

      - name: Start Next.js server
        run: |
          npm run start &
          echo $! > /tmp/next-perf.pid
        env:
          NODE_ENV: production

      - name: Wait for server
        run: npx wait-on -t 120000 http://127.0.0.1:3000

      - name: Generate performance report
        env:
          BASE_URL: http://127.0.0.1:3000
          PERF_EXTERNAL_SERVER: "1"
        run: npm run perf:report

      - name: Stop Next.js server
        if: always()
        run: |
          if [ -f /tmp/next-perf.pid ]; then kill "$(cat /tmp/next-perf.pid)" 2>/dev/null || true; fi

      - name: Upload performance report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-report
          path: performance-report
          retention-days: 30

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/prod' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download report
        uses: actions/download-artifact@v8
        with:
          name: performance-report
          path: performance-report

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: performance-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
