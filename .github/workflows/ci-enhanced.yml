name: CI Enhanced

on:
  pull_request:
    branches: [sandbox, ci-testing]  # Test on sandbox first
  push:
    branches: [sandbox, ci-testing]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Run lint
        id: lint
        run: |
          npm run lint 2>&1 | tee lint-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      
      - name: Report lint results
        if: steps.lint.outcome == 'failure'
        run: |
          echo "## ❌ Lint Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View lint errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat lint-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm run lint" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Run type check
        id: typecheck
        run: |
          npx tsc --noEmit 2>&1 | tee typecheck-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      
      - name: Report type check results
        if: steps.typecheck.outcome == 'failure'
        run: |
          echo "## ❌ Type Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View type errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat typecheck-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npx tsc --noEmit" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      MAIL_FROM: "no-reply@notify.dev.alpha.gov.bb"
      SES_REGION: "us-east-1"
      FEEDBACK_TO_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
      FEEDBACK_FROM_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Run unit tests
        id: test
        run: |
          npm run test:unit:run 2>&1 | tee test-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      
      - name: Report test results
        if: steps.test.outcome == 'failure'
        run: |
          echo "## ❌ Unit Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View test failures</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat test-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm run test:unit" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, secrets-scan]
    env:
      MAIL_FROM: "no-reply@notify.dev.alpha.gov.bb"
      SES_REGION: "us-east-1"
      FEEDBACK_TO_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
      FEEDBACK_FROM_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Build application
        id: build
        run: |
          npm run build 2>&1 | tee build-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      
      - name: Report build results
        if: steps.build.outcome == 'failure'
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View build errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -100 build-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm run build" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for gitleaks
      
      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
      
      - name: Run Gitleaks
        id: gitleaks
        run: |
          gitleaks detect --source . --verbose --report-format json --report-path gitleaks-report.json 2>&1 | tee gitleaks-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      
      - name: Generate SARIF report
        if: always()
        run: |
          gitleaks detect --source . --report-format sarif --report-path gitleaks-report.sarif || true
        continue-on-error: true
      
      - name: Upload Gitleaks SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif
        continue-on-error: true
      
      - name: Analyze secrets and report
        if: steps.gitleaks.outcome == 'failure'
        run: |
          # Parse findings and separate current vs historical
          python3 << 'EOF' > secrets-analysis.txt
          import json
          import os
          
          try:
              with open('gitleaks-report.json', 'r') as f:
                  data = json.load(f)
              
              current_secrets = []
              historical_secrets = []
              
              for finding in data:
                  file = finding.get('File', 'Unknown')
                  if os.path.exists(file):
                      current_secrets.append(finding)
                  else:
                      historical_secrets.append(finding)
              
              # Output counts for shell script
              print(f"CURRENT_COUNT={len(current_secrets)}")
              print(f"HISTORICAL_COUNT={len(historical_secrets)}")
              
              # Save separated findings
              with open('current-secrets.json', 'w') as f:
                  json.dump(current_secrets, f)
              with open('historical-secrets.json', 'w') as f:
                  json.dump(historical_secrets, f)
                  
          except Exception as e:
              print(f"ERROR={e}")
              print("CURRENT_COUNT=0")
              print("HISTORICAL_COUNT=0")
          EOF
          
          # Source the counts
          source secrets-analysis.txt
          
          # Generate summary
          if [ "$CURRENT_COUNT" -gt 0 ]; then
            echo "## 🚨 Secrets Detected in Current Code" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **CRITICAL: $CURRENT_COUNT hardcoded secret(s) found in current files!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Current Files (Build Blocking):" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Display current secrets
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          import os
          
          repo = os.environ.get('GITHUB_REPOSITORY', '')
          sha = os.environ.get('GITHUB_SHA', '')
          
          with open('current-secrets.json', 'r') as f:
              data = json.load(f)
          
          for i, finding in enumerate(data, 1):
              file = finding.get('File', 'Unknown')
              line = finding.get('StartLine', 'Unknown')
              rule = finding.get('RuleID', 'Unknown')
              secret = finding.get('Secret', '')
              match = finding.get('Match', '')
              
              if secret and len(secret) > 8:
                  masked = secret[:4] + '*' * (len(secret) - 8) + secret[-4:]
              else:
                  masked = '*' * len(secret) if secret else 'N/A'
              
              print(f"**{i}. {rule}**")
              print(f"- **Location**: `{file}` (line {line})")
              
              if repo and sha and file != 'Unknown':
                  file_url = f"https://github.com/{repo}/blob/{sha}/{file}#L{line}"
                  print(f"- **View file**: [{file}:{line}]({file_url})")
              
              print(f"- **Match**: `{match[:100]}...`" if len(match) > 100 else f"- **Match**: `{match}`")
              print(f"- **Secret**: `{masked}`")
              print("")
          EOF
          fi
          
          if [ "$HISTORICAL_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ⚠️ Secrets Found in Git History" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**$HISTORICAL_COUNT secret(s) found in deleted files (not blocking build)**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>View historical secrets (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Display historical secrets
            python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          import os
          
          with open('historical-secrets.json', 'r') as f:
              data = json.load(f)
          
          for i, finding in enumerate(data, 1):
              file = finding.get('File', 'Unknown')
              line = finding.get('StartLine', 'Unknown')
              rule = finding.get('RuleID', 'Unknown')
              secret = finding.get('Secret', '')
              commit = finding.get('Commit', '')
              
              if secret and len(secret) > 8:
                  masked = secret[:4] + '*' * (len(secret) - 8) + secret[-4:]
              else:
                  masked = '*' * len(secret) if secret else 'N/A'
              
              print(f"**{i}. {rule}**")
              print(f"- **Location**: `{file}` (line {line}) - File deleted")
              if commit:
                  print(f"- **Found in commit**: `{commit[:8]}`")
              print(f"- **Secret**: `{masked}`")
              print("")
          EOF
            
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "💡 These secrets exist in git history but not in current files. Consider rotating them if they were real credentials." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action required:**" >> $GITHUB_STEP_SUMMARY
          if [ "$CURRENT_COUNT" -gt 0 ]; then
            echo "1. ⛔ **Fix current files immediately** - Remove secrets and use environment variables" >> $GITHUB_STEP_SUMMARY
            echo "2. Rotate any exposed credentials" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$HISTORICAL_COUNT" -gt 0 ]; then
            echo "3. ⚠️ Review historical secrets - Rotate if they were real credentials" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View full Gitleaks output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat gitleaks-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          
          # Only fail if there are current secrets
          if [ "$CURRENT_COUNT" -gt 0 ]; then
            exit 1
          else
            exit 0
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      
      - name: Perform CodeQL Analysis
        id: codeql
        uses: github/codeql-action/analyze@v3
        with:
          output: sarif-results
          upload: false
        continue-on-error: true
      
      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-results
        continue-on-error: true
      
      - name: Parse and report security results
        if: always()
        run: |
          # Find the SARIF file
          SARIF_FILE=$(find sarif-results -name "*.sarif" -type f | head -n 1)
          
          if [ -z "$SARIF_FILE" ]; then
            echo "## ✅ Security Scan Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No SARIF results file found. CodeQL analysis may still be processing." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          
          # Parse SARIF and generate summary
          python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          import os
          import glob
          
          # Find SARIF file
          sarif_files = glob.glob('sarif-results/**/*.sarif', recursive=True)
          if not sarif_files:
              print("## ✅ Security Scan Complete")
              print("")
              print("No security issues detected by CodeQL.")
              exit(0)
          
          sarif_file = sarif_files[0]
          
          try:
              with open(sarif_file, 'r') as f:
                  sarif = json.load(f)
              
              # Extract results
              all_results = []
              for run in sarif.get('runs', []):
                  results = run.get('results', [])
                  rules = {r['id']: r for r in run.get('tool', {}).get('driver', {}).get('rules', [])}
                  
                  for result in results:
                      rule_id = result.get('ruleId', 'Unknown')
                      rule = rules.get(rule_id, {})
                      
                      level = result.get('level', 'warning')
                      message = result.get('message', {}).get('text', 'No description')
                      
                      # Get location
                      locations = result.get('locations', [])
                      if locations:
                          loc = locations[0].get('physicalLocation', {})
                          file = loc.get('artifactLocation', {}).get('uri', 'Unknown')
                          region = loc.get('region', {})
                          line = region.get('startLine', 'Unknown')
                      else:
                          file = 'Unknown'
                          line = 'Unknown'
                      
                      # Get fix recommendation from rule
                      fix_recommendation = None
                      if rule:
                          # Try to get fix from rule help or description
                          help_text = rule.get('help', {})
                          if isinstance(help_text, dict):
                              fix_recommendation = help_text.get('text', '')
                          elif isinstance(help_text, str):
                              fix_recommendation = help_text
                          
                          # If no help text, try full description
                          if not fix_recommendation:
                              full_desc = rule.get('fullDescription', {})
                              if isinstance(full_desc, dict):
                                  fix_recommendation = full_desc.get('text', '')
                      
                      all_results.append({
                          'rule_id': rule_id,
                          'level': level,
                          'message': message,
                          'file': file,
                          'line': line,
                          'rule_name': rule.get('shortDescription', {}).get('text', rule_id),
                          'fix': fix_recommendation
                      })
              
              if not all_results:
                  print("## ✅ Security Scan Complete")
                  print("")
                  print("No security issues detected by CodeQL.")
              else:
                  # Group by severity
                  errors = [r for r in all_results if r['level'] == 'error']
                  warnings = [r for r in all_results if r['level'] == 'warning']
                  notes = [r for r in all_results if r['level'] == 'note']
                  
                  print("## ⚠️ Security Issues Found")
                  print("")
                  print(f"CodeQL detected **{len(all_results)} potential security issue(s)**:")
                  print(f"- 🔴 {len(errors)} error(s)")
                  print(f"- 🟡 {len(warnings)} warning(s)")
                  print(f"- 🔵 {len(notes)} note(s)")
                  print("")
                  
                  # Get repo info
                  repo = os.environ.get('GITHUB_REPOSITORY', '')
                  sha = os.environ.get('GITHUB_SHA', '')
                  
                  # Show errors first
                  if errors:
                      print("### 🔴 Critical Issues")
                      print("")
                      for i, issue in enumerate(errors[:5], 1):  # Limit to 5
                          print(f"**{i}. {issue['rule_name']}**")
                          print(f"- **File**: `{issue['file']}` (line {issue['line']})")
                          if repo and sha and issue['file'] != 'Unknown':
                              file_url = f"https://github.com/{repo}/blob/{sha}/{issue['file']}#L{issue['line']}"
                              print(f"- **View code**: [{issue['file']}:{issue['line']}]({file_url})")
                          print(f"- **Issue**: {issue['message'][:200]}{'...' if len(issue['message']) > 200 else ''}")
                          if issue['fix']:
                              # Extract first sentence or first 200 chars as fix suggestion
                              fix_text = issue['fix'].split('.')[0] if '.' in issue['fix'] else issue['fix'][:200]
                              print(f"- **Recommended fix**: {fix_text}")
                          print("")
                      
                      if len(errors) > 5:
                          print(f"*...and {len(errors) - 5} more error(s)*")
                          print("")
                  
                  # Show warnings (collapsed)
                  if warnings:
                      print("<details><summary>🟡 View {0} warning(s)</summary>".format(len(warnings)))
                      print("")
                      for i, issue in enumerate(warnings[:10], 1):  # Limit to 10
                          print(f"**{i}. {issue['rule_name']}**")
                          print(f"- **File**: `{issue['file']}` (line {issue['line']})")
                          if repo and sha and issue['file'] != 'Unknown':
                              file_url = f"https://github.com/{repo}/blob/{sha}/{issue['file']}#L{issue['line']}"
                              print(f"- **View code**: [{issue['file']}:{issue['line']}]({file_url})")
                          print(f"- **Issue**: {issue['message'][:200]}{'...' if len(issue['message']) > 200 else ''}")
                          if issue['fix']:
                              fix_text = issue['fix'].split('.')[0] if '.' in issue['fix'] else issue['fix'][:200]
                              print(f"- **Recommended fix**: {fix_text}")
                          print("")
                      
                      if len(warnings) > 10:
                          print(f"*...and {len(warnings) - 10} more warning(s)*")
                      print("</details>")
                      print("")
                  
                  print("---")
                  print("")
                  print("**View full details**: Go to the Security tab → Code scanning alerts")
                  print("")
                  print("**Note**: This won't block your build, but please review and fix the findings.")
          
          except Exception as e:
              print("## ⚠️ Security Scan Complete")
              print("")
              print(f"Could not parse SARIF results: {e}")
              print("")
              print("**View details**: Go to the Security tab → Code scanning alerts")
          EOF

