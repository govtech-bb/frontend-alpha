name: CI Enhanced

on:
  pull_request:
    branches: [sandbox, ci-testing]  # Test on sandbox first
  push:
    branches: [sandbox, ci-testing]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Run lint
        id: lint
        run: |
          npm run lint 2>&1 | tee lint-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      
      - name: Report lint results
        if: steps.lint.outcome == 'failure'
        run: |
          echo "## ❌ Lint Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View lint errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat lint-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm run lint" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Run type check
        id: typecheck
        run: |
          npx tsc --noEmit 2>&1 | tee typecheck-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      
      - name: Report type check results
        if: steps.typecheck.outcome == 'failure'
        run: |
          echo "## ❌ Type Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View type errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat typecheck-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npx tsc --noEmit" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      MAIL_FROM: "no-reply@notify.dev.alpha.gov.bb"
      SES_REGION: "us-east-1"
      FEEDBACK_TO_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
      FEEDBACK_FROM_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Run unit tests
        id: test
        run: |
          npm run test:unit:run 2>&1 | tee test-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      
      - name: Report test results
        if: steps.test.outcome == 'failure'
        run: |
          echo "## ❌ Unit Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View test failures</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat test-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm run test:unit" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, secrets-scan, security]
    env:
      MAIL_FROM: "no-reply@notify.dev.alpha.gov.bb"
      SES_REGION: "us-east-1"
      FEEDBACK_TO_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
      FEEDBACK_FROM_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Build application
        id: build
        run: |
          npm run build 2>&1 | tee build-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      
      - name: Report build results
        if: steps.build.outcome == 'failure'
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View build errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -100 build-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm run build" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required to upload SARIF results
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Start with current commit only for fast scanning
      
      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
      
      - name: Scan current commit for secrets
        id: gitleaks_current
        run: |
          gitleaks detect --source . --verbose --report-format json --report-path gitleaks-current.json 2>&1 | tee gitleaks-current-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      
      - name: Fetch full history and scan if secrets found
        id: gitleaks_history
        if: steps.gitleaks_current.outcome == 'failure'
        run: |
          echo "Secrets found in current commit. Checking git history for similar secrets..."
          git fetch --unshallow || git fetch --depth=1000
          gitleaks detect --source . --verbose --report-format json --report-path gitleaks-history.json 2>&1 | tee gitleaks-history-output.txt || true
        continue-on-error: true
      
      - name: Generate SARIF report
        if: always()
        run: |
          gitleaks detect --source . --report-format sarif --report-path gitleaks-report.sarif || true
        continue-on-error: true
      
      - name: Upload Gitleaks SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif
        continue-on-error: true
      
      - name: Analyze and report secrets
        if: steps.gitleaks_current.outcome == 'failure'
        run: |
          # Parse current commit secrets
          python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          import os
          
          repo = os.environ.get('GITHUB_REPOSITORY', '')
          sha = os.environ.get('GITHUB_SHA', '')
          
          # Load current commit secrets
          try:
              with open('gitleaks-current.json', 'r') as f:
                  current_data = json.load(f)
          except:
              current_data = []
          
          # Load historical secrets if available
          try:
              with open('gitleaks-history.json', 'r') as f:
                  history_data = json.load(f)
          except:
              history_data = []
          
          # Separate current vs historical
          current_secrets = []
          historical_secrets = []
          
          current_files = set()
          for finding in current_data:
              file = finding.get('File', 'Unknown')
              current_files.add(file)
              if os.path.exists(file):
                  current_secrets.append(finding)
          
          # Historical secrets are those in history but not in current commit
          for finding in history_data:
              file = finding.get('File', 'Unknown')
              if file not in current_files or not os.path.exists(file):
                  historical_secrets.append(finding)
          
          # Generate summary
          print("## 🚨 Secrets Detected")
          print("")
          
          if current_secrets:
              print(f"### ⛔ Current Commit: {len(current_secrets)} secret(s) - BUILD BLOCKED")
              print("")
              print("**These secrets are in your current changes and must be fixed:**")
              print("")
              
              for i, finding in enumerate(current_secrets, 1):
                  file = finding.get('File', 'Unknown')
                  line = finding.get('StartLine', 'Unknown')
                  rule = finding.get('RuleID', 'Unknown')
                  secret = finding.get('Secret', '')
                  match = finding.get('Match', '')
                  
                  if secret and len(secret) > 8:
                      masked = secret[:4] + '*' * (len(secret) - 8) + secret[-4:]
                  else:
                      masked = '*' * len(secret) if secret else 'N/A'
                  
                  print(f"**{i}. {rule}**")
                  print(f"- **Location**: `{file}` (line {line})")
                  
                  if repo and sha and file != 'Unknown':
                      file_url = f"https://github.com/{repo}/blob/{sha}/{file}#L{line}"
                      print(f"- **View file**: [{file}:{line}]({file_url})")
                  
                  print(f"- **Match**: `{match[:100]}...`" if len(match) > 100 else f"- **Match**: `{match}`")
                  print(f"- **Secret**: `{masked}`")
                  print("")
          
          if historical_secrets:
              print("")
              print("---")
              print("")
              print(f"### ⚠️ Git History: {len(historical_secrets)} secret(s) found - WARNING ONLY")
              print("")
              print("**These secrets exist in other branches or deleted files (not blocking build):**")
              print("")
              print("<details><summary>Click to view historical secrets</summary>")
              print("")
              
              for i, finding in enumerate(historical_secrets[:20], 1):  # Limit to 20
                  file = finding.get('File', 'Unknown')
                  line = finding.get('StartLine', 'Unknown')
                  rule = finding.get('RuleID', 'Unknown')
                  secret = finding.get('Secret', '')
                  commit = finding.get('Commit', '')
                  
                  if secret and len(secret) > 8:
                      masked = secret[:4] + '*' * (len(secret) - 8) + secret[-4:]
                  else:
                      masked = '*' * len(secret) if secret else 'N/A'
                  
                  print(f"**{i}. {rule}**")
                  print(f"- **Location**: `{file}` (line {line})")
                  if commit:
                      print(f"- **Commit**: `{commit[:8]}`")
                  print(f"- **Secret**: `{masked}`")
                  print("")
              
              if len(historical_secrets) > 20:
                  print(f"*...and {len(historical_secrets) - 20} more historical secret(s)*")
              
              print("</details>")
              print("")
              print("💡 **Recommendation**: These secrets should be rotated if they were real credentials.")
          
          print("")
          print("---")
          print("")
          print("## 🔧 How to Fix")
          print("")
          print("**Replace hardcoded secrets with safe placeholder values:**")
          print("")
          print("**Safe patterns that won't trigger the scanner:**")
          print("- Environment variables: `process.env.NEXT_PUBLIC_DD_CLIENT_TOKEN`")
          print("- Descriptive text: `'your-datadog-token-here'`, `'replace-with-your-api-key'`")
          print("- Obvious fake values: `'xxxx-xxxx-xxxx-xxxx'`, `'0000000000000000'`")
          print("- Example format: `'pub_EXAMPLE_TOKEN_12345'` (prefix with EXAMPLE)")
          print("- Create `.env.example` with placeholder values")
          print("")
          print("**Example:**")
          print("```javascript")
          print("// ❌ BAD: const token = 'pub_EXAMPLE_REAL_TOKEN_12345'")
          print("// ✅ GOOD: const token = process.env.NEXT_PUBLIC_DD_CLIENT_TOKEN")
          print("// ✅ GOOD: const token = 'your-datadog-client-token-here'")
          print("```")
          print("")
          print("**Then:**")
          print("1. Fix the secrets in your current changes")
          print("2. Rotate any exposed credentials immediately")
          if historical_secrets:
              print("3. Consider rotating historical secrets found in git history")
          
          EOF
          
          # Always fail if current secrets found
          exit 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended  # Use security-extended query suite for better severity info
      
      - name: Perform CodeQL Analysis
        id: codeql
        uses: github/codeql-action/analyze@v4
        with:
          output: sarif-results
          upload: false
        continue-on-error: true
      
      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results
        continue-on-error: true
      
      - name: Parse and report security results
        if: always()
        run: |
          # Find the SARIF file
          SARIF_FILE=$(find sarif-results -name "*.sarif" -type f | head -n 1)
          
          if [ -z "$SARIF_FILE" ]; then
            echo "## ✅ Security Scan Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No SARIF results file found. CodeQL analysis may still be processing." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          
          # Parse SARIF and generate summary
          python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          import os
          import glob
          import sys
          
          # Find SARIF file
          sarif_files = glob.glob('sarif-results/**/*.sarif', recursive=True)
          if not sarif_files:
              print("## ✅ Security Scan Complete")
              print("")
              print("No security issues detected by CodeQL.")
              exit(0)
          
          sarif_file = sarif_files[0]
          
          try:
              with open(sarif_file, 'r') as f:
                  sarif = json.load(f)
              
              # Extract results
              all_results = []
              
              for run in sarif.get('runs', []):
                  results = run.get('results', [])
                  rules = {r['id']: r for r in run.get('tool', {}).get('driver', {}).get('rules', [])}
                  
                  for result in results:
                      rule_id = result.get('ruleId', 'Unknown')
                      rule = rules.get(rule_id, {})
                      
                      level = result.get('level', 'warning')
                      message = result.get('message', {}).get('text', 'No description')
                      
                      # Get security severity from properties
                      properties = result.get('properties', {})
                      security_severity = properties.get('security-severity', '')
                      kind = properties.get('kind', '')
                      precision = properties.get('precision', '')
                      tags = properties.get('tags', [])
                      
                      # Also check rule metadata for security severity
                      if not security_severity and rule:
                          rule_properties = rule.get('properties', {})
                          security_severity = rule_properties.get('security-severity', '')
                          if not tags:
                              tags = rule_properties.get('tags', [])
                      
                      # Map security severity to labels
                      if security_severity:
                          try:
                              severity_score = float(security_severity)
                              if severity_score >= 9.0:
                                  severity_label = 'Critical'
                              elif severity_score >= 7.0:
                                  severity_label = 'High'
                              elif severity_score >= 4.0:
                                  severity_label = 'Medium'
                              else:
                                  severity_label = 'Low'
                          except:
                              severity_label = 'Unknown'
                      else:
                          # Check tags for security severity indicators
                          has_security_tag = any('security' in str(tag).lower() for tag in tags)
                          has_external_tag = any('external' in str(tag).lower() for tag in tags)
                          
                          # Fallback: use CodeQL's level if no security-severity
                          # CodeQL levels: error, warning, note
                          if level == 'error':
                              severity_label = 'High'
                          elif level == 'warning':
                              # For warnings, check if it's a security issue
                              if has_security_tag or 'security' in kind.lower() or 'path-problem' in kind.lower():
                                  # Security warnings with high precision or external/cwe tags are High severity
                                  if precision in ['high', 'very-high'] or has_external_tag:
                                      severity_label = 'High'
                                  else:
                                      severity_label = 'Medium'
                              else:
                                  severity_label = 'Medium'
                          elif level == 'note':
                              severity_label = 'Low'
                          else:
                              severity_label = 'Unknown'
                      
                      # Debug: print what we found for this issue
                      print(f"<!-- DEBUG: Rule {rule_id}: level={level}, security-severity={security_severity}, kind={kind}, precision={precision}, tags={tags}, final_severity={severity_label} -->", file=sys.stderr)
                      
                      # Get location
                      locations = result.get('locations', [])
                      if locations:
                          loc = locations[0].get('physicalLocation', {})
                          file = loc.get('artifactLocation', {}).get('uri', 'Unknown')
                          region = loc.get('region', {})
                          line = region.get('startLine', 'Unknown')
                      else:
                          file = 'Unknown'
                          line = 'Unknown'
                      
                      # Get fix recommendation from rule
                      fix_recommendation = None
                      rule_help_uri = None
                      
                      if rule:
                          # Get help URI for more details
                          rule_help_uri = rule.get('helpUri', '')
                          
                          # Try to get fix from rule help or description
                          help_text = rule.get('help', {})
                          if isinstance(help_text, dict):
                              fix_recommendation = help_text.get('text', '')
                          elif isinstance(help_text, str):
                              fix_recommendation = help_text
                          
                          # If no help text, try full description
                          if not fix_recommendation:
                              full_desc = rule.get('fullDescription', {})
                              if isinstance(full_desc, dict):
                                  fix_recommendation = full_desc.get('text', '')
                      
                      all_results.append({
                          'rule_id': rule_id,
                          'level': level,
                          'severity': severity_label,
                          'severity_score': security_severity,
                          'message': message,
                          'file': file,
                          'line': line,
                          'rule_name': rule.get('shortDescription', {}).get('text', rule_id),
                          'fix': fix_recommendation,
                          'help_uri': rule_help_uri
                      })
              
              if not all_results:
                  print("## ✅ Security Scan Complete")
                  print("")
                  print("No security issues detected by CodeQL.")
              else:
                  # Group by severity
                  critical = [r for r in all_results if r['severity'] == 'Critical']
                  high = [r for r in all_results if r['severity'] == 'High']
                  medium = [r for r in all_results if r['severity'] == 'Medium']
                  low = [r for r in all_results if r['severity'] == 'Low']
                  unknown = [r for r in all_results if r['severity'] == 'Unknown']
                  
                  # Get repo info
                  repo = os.environ.get('GITHUB_REPOSITORY', '')
                  sha = os.environ.get('GITHUB_SHA', '')
                  
                  # Determine status
                  priority_issues = critical + high
                  if priority_issues:
                      print("## ⚠️ Security Issues Found - BUILD BLOCKED")
                  else:
                      print("## ⚠️ Security Issues Found")
                  
                  print("")
                  print(f"CodeQL detected **{len(all_results)} potential security issue(s)**:")
                  print("")
                  
                  # Summary counts
                  if critical:
                      print(f"- 🔴 **{len(critical)} Critical**")
                  if high:
                      print(f"- 🟠 **{len(high)} High**")
                  if medium:
                      print(f"- 🟡 **{len(medium)} Medium**")
                  if low:
                      print(f"- 🟢 **{len(low)} Low**")
                  if unknown:
                      print(f"- ⚪ **{len(unknown)} Unknown severity**")
                  print("")
                  
                  # Show first priority issue as example
                  if priority_issues:
                      first_issue = priority_issues[0]
                      severity_emoji = '🔴' if first_issue['severity'] == 'Critical' else '🟠'
                      print(f"**{severity_emoji} {first_issue['severity']}: {first_issue['rule_name']}**")
                      print(f"- **File**: `{first_issue['file']}` (line {first_issue['line']})")
                      print(f"- **Issue**: {first_issue['message'][:150]}{'...' if len(first_issue['message']) > 150 else ''}")
                      if repo and first_issue['rule_id']:
                          alerts_url = f"https://github.com/{repo}/security/code-scanning"
                          print(f"- **View in Security tab**: [See alert details]({alerts_url})")
                      print("")
                  elif medium:
                      first_issue = medium[0]
                      print(f"**🟡 {first_issue['severity']}: {first_issue['rule_name']}**")
                      print(f"- **File**: `{first_issue['file']}` (line {first_issue['line']})")
                      print(f"- **Issue**: {first_issue['message'][:150]}{'...' if len(first_issue['message']) > 150 else ''}")
                      if repo and first_issue['rule_id']:
                          alerts_url = f"https://github.com/{repo}/security/code-scanning"
                          print(f"- **View in Security tab**: [See alert details]({alerts_url})")
                      print("")
                  
                  # Collapsed details for all issues
                  print("<details><summary>View all {0} issue(s)</summary>".format(len(all_results)))
                  print("")
                  
                  # Show critical and high severity issues
                  if priority_issues:
                      print("### 🔴 Critical & High Severity Issues")
                      print("")
                      for i, issue in enumerate(priority_issues, 1):
                          severity_emoji = '🔴' if issue['severity'] == 'Critical' else '🟠'
                          print(f"**{i}. {severity_emoji} {issue['severity']}: {issue['rule_name']}**")
                          print(f"- **File**: `{issue['file']}` (line {issue['line']})")
                          if repo and sha and issue['file'] != 'Unknown':
                              file_url = f"https://github.com/{repo}/blob/{sha}/{issue['file']}#L{issue['line']}"
                              print(f"- **View code**: [{issue['file']}:{issue['line']}]({file_url})")
                          print(f"- **Issue**: {issue['message'][:200]}{'...' if len(issue['message']) > 200 else ''}")
                          
                          if repo and issue['rule_id']:
                              alerts_url = f"https://github.com/{repo}/security/code-scanning?query=is:open+rule:{issue['rule_id']}"
                              print(f"- **View in Security tab**: [See alert details]({alerts_url})")
                          
                          if issue['fix']:
                              fix_text = issue['fix'].split('.')[0] if '.' in issue['fix'] else issue['fix'][:200]
                              print(f"- **Recommended fix**: {fix_text}")
                          elif issue['help_uri']:
                              print(f"- **Learn more**: [View documentation]({issue['help_uri']})")
                          print("")
                  
                  # Show medium severity
                  if medium:
                      print("### 🟡 Medium Severity Issues")
                      print("")
                      for i, issue in enumerate(medium, 1):
                          print(f"**{i}. 🟡 Medium: {issue['rule_name']}**")
                          print(f"- **File**: `{issue['file']}` (line {issue['line']})")
                          if repo and sha and issue['file'] != 'Unknown':
                              file_url = f"https://github.com/{repo}/blob/{sha}/{issue['file']}#L{issue['line']}"
                              print(f"- **View code**: [{issue['file']}:{issue['line']}]({file_url})")
                          print(f"- **Issue**: {issue['message'][:200]}{'...' if len(issue['message']) > 200 else ''}")
                          
                          if repo and issue['rule_id']:
                              alerts_url = f"https://github.com/{repo}/security/code-scanning?query=is:open+rule:{issue['rule_id']}"
                              print(f"- **View in Security tab**: [See alert details]({alerts_url})")
                          
                          if issue['fix']:
                              fix_text = issue['fix'].split('.')[0] if '.' in issue['fix'] else issue['fix'][:200]
                              print(f"- **Recommended fix**: {fix_text}")
                          elif issue['help_uri']:
                              print(f"- **Learn more**: [View documentation]({issue['help_uri']})")
                          print("")
                  
                  # Show low severity
                  if low:
                      print("### 🟢 Low Severity Issues")
                      print("")
                      for i, issue in enumerate(low, 1):
                          print(f"**{i}. 🟢 Low: {issue['rule_name']}**")
                          print(f"- **File**: `{issue['file']}` (line {issue['line']})")
                          if repo and issue['rule_id']:
                              alerts_url = f"https://github.com/{repo}/security/code-scanning?query=is:open+rule:{issue['rule_id']}"
                              print(f"- **View in Security tab**: [See alert details]({alerts_url})")
                          print("")
                  
                  # Show unknown severity
                  if unknown:
                      print("### ⚪ Unknown Severity Issues")
                      print("")
                      for i, issue in enumerate(unknown, 1):
                          print(f"**{i}. {issue['rule_name']}**")
                          print(f"- **File**: `{issue['file']}` (line {issue['line']})")
                          if repo and sha and issue['file'] != 'Unknown':
                              file_url = f"https://github.com/{repo}/blob/{sha}/{issue['file']}#L{issue['line']}"
                              print(f"- **View code**: [{issue['file']}:{issue['line']}]({file_url})")
                          print(f"- **Issue**: {issue['message'][:200]}{'...' if len(issue['message']) > 200 else ''}")
                          
                          if repo and issue['rule_id']:
                              alerts_url = f"https://github.com/{repo}/security/code-scanning?query=is:open+rule:{issue['rule_id']}"
                              print(f"- **View in Security tab**: [See alert details]({alerts_url})")
                          
                          if issue['fix']:
                              fix_text = issue['fix'].split('.')[0] if '.' in issue['fix'] else issue['fix'][:200]
                              print(f"- **Recommended fix**: {fix_text}")
                          elif issue['help_uri']:
                              print(f"- **Learn more**: [View documentation]({issue['help_uri']})")
                          print("")
                  
                  print("</details>")
                  print("")
                  print("**View full details**: Go to the Security tab → Code scanning alerts")
                  print("")
                  
                  # Determine if we should fail based on severity
                  if priority_issues:
                      print("**⛔ Build blocked**: Critical or High severity issues must be fixed before merging.")
                  else:
                      print("**Note**: Medium and Low severity issues won't block your build, but please review and fix them.")
          
          except Exception as e:
              print("## ⚠️ Security Scan Complete")
              print("")
              print(f"Could not parse SARIF results: {e}")
              print("")
              print("**View details**: Go to the Security tab → Code scanning alerts")
          
          # Write result to file for shell script to read
          import sys
          
          # Only fail if there are critical/high issues
          critical = [r for r in all_results if r['severity'] == 'Critical']
          high = [r for r in all_results if r['severity'] == 'High']
          
          with open('security-result.txt', 'w') as f:
              if critical or high:
                  f.write('BLOCK_BUILD=1')
                  sys.exit(1)
              else:
                  f.write('BLOCK_BUILD=0')
                  sys.exit(0)
          EOF

