name: CI Enhanced

on:
  pull_request:
    branches: [sandbox, ci-testing]  # Test on sandbox first
  push:
    branches: [sandbox, ci-testing]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Run lint
        id: lint
        run: npm run lint
        continue-on-error: true
      
      - name: Report lint results
        if: steps.lint.outcome == 'failure'
        run: |
          echo "## ❌ Lint Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm run lint" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Run type check
        id: typecheck
        run: npx tsc --noEmit
        continue-on-error: true
      
      - name: Report type check results
        if: steps.typecheck.outcome == 'failure'
        run: |
          echo "## ❌ Type Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npx tsc --noEmit" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      MAIL_FROM: "no-reply@notify.dev.alpha.gov.bb"
      SES_REGION: "us-east-1"
      FEEDBACK_TO_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
      FEEDBACK_FROM_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Run unit tests
        id: test
        run: npm run test:unit:run
        continue-on-error: true
      
      - name: Report test results
        if: steps.test.outcome == 'failure'
        run: |
          echo "## ❌ Unit Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm run test:unit" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    env:
      MAIL_FROM: "no-reply@notify.dev.alpha.gov.bb"
      SES_REGION: "us-east-1"
      FEEDBACK_TO_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
      FEEDBACK_FROM_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      
      - name: Build application
        id: build
        run: npm run build
        continue-on-error: true
      
      - name: Report build results
        if: steps.build.outcome == 'failure'
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm run build" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy
    env:
      MAIL_FROM: "no-reply@notify.dev.alpha.gov.bb"
      SES_REGION: "us-east-1"
      FEEDBACK_TO_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
      FEEDBACK_FROM_EMAIL: "no-reply@notify.dev.alpha.gov.bb"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      
      - name: Run E2E tests
        id: e2e
        run: npx playwright test visual
        continue-on-error: true
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      
      - name: Report E2E results
        if: steps.e2e.outcome == 'failure'
        run: |
          echo "## ❌ E2E Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Visual regression tests detected changes." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**If changes are intentional, update snapshots:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm run test:e2e:update" >> $GITHUB_STEP_SUMMARY
          echo "git add tests/" >> $GITHUB_STEP_SUMMARY
          echo "git commit -m 'test: Update visual snapshots'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**View the report:** Download the 'playwright-report' artifact above" >> $GITHUB_STEP_SUMMARY
          exit 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      
      - name: Perform CodeQL Analysis
        id: codeql
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
      
      - name: Report security results
        if: steps.codeql.outcome == 'failure'
        run: |
          echo "## ⚠️ Security Issues Found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CodeQL detected potential security vulnerabilities." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**View details:** Go to the Security tab → Code scanning alerts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** This won't block your PR, but please review the findings." >> $GITHUB_STEP_SUMMARY
